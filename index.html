<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>MS Paint</title>
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
		<meta name="robots" content="noindex, nofollow">
		<link href="styles/normalize.css" rel="stylesheet" type="text/css">
		<link href="styles/layout.css" rel="stylesheet" type="text/css">
		<link href="styles/print.css" rel="stylesheet" type="text/css" media="print">
		<link rel="icon" href="images/icons/32.png" sizes="32x32" type="image/png">
		<link rel="icon" href="images/icons/windows.ico" sizes="16x16 32x32 48x48" type="image/icon">
		<style>
			html,
			body {
				overflow: hidden;
				background: #f0f0f0;
			}

			.jspaint {
				width: 100%;
				height: 100%;
				margin: 0;
			}

			.native-window-titlebar {
				display: none;
			}

			html.native-window-shell .native-window-titlebar {
				align-items: center;
				background: linear-gradient(90deg, #000080, #1084d0);
				box-sizing: border-box;
				color: #ffffff;
				display: flex;
				font: bold 13px "MS Sans Serif", "Tahoma", sans-serif;
				height: 31px;
				justify-content: space-between;
				line-height: 1;
				padding: 3px 3px 3px 8px;
				-webkit-user-select: none;
				user-select: none;
			}

			html.native-window-shell .jspaint {
				height: calc(100% - 31px);
			}

			.native-window-title {
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}

			.native-window-controls {
				display: flex;
				gap: 2px;
				height: 24px;
			}

			.native-window-button {
				align-items: center;
				background: #c0c0c0;
				border: 0;
				border-bottom: 2px solid #404040;
				border-left: 2px solid #ffffff;
				border-right: 2px solid #404040;
				border-top: 2px solid #ffffff;
				box-sizing: border-box;
				color: #000000;
				display: flex;
				font: bold 14px "Arial", sans-serif;
				height: 23px;
				justify-content: center;
				margin: 0;
				min-width: 25px;
				padding: 0;
			}

			.native-window-button:active {
				border-bottom-color: #ffffff;
				border-left-color: #404040;
				border-right-color: #ffffff;
				border-top-color: #404040;
				padding-left: 1px;
				padding-top: 1px;
			}

			.native-window-button.close:hover {
				background: #c75050;
				color: #ffffff;
			}
		</style>
	</head>
	<body>
		<div class="native-window-titlebar">
			<div class="native-window-title">MS Paint</div>
			<div class="native-window-controls">
				<button class="native-window-button minimize" type="button" data-window-action="minimize" aria-label="Minimize">_</button>
				<button class="native-window-button maximize" type="button" data-window-action="maximize" aria-label="Maximize">&#9633;</button>
				<button class="native-window-button close" type="button" data-window-action="close" aria-label="Close">&#215;</button>
			</div>
		</div>
		<script>
			(function(){
				function sendWindowAction(action) {
					if (
						window.webkit &&
						window.webkit.messageHandlers &&
						window.webkit.messageHandlers.windowControl
					) {
						window.webkit.messageHandlers.windowControl.postMessage(action);
					}
				}

				document.addEventListener("DOMContentLoaded", function(){
					var buttons = document.querySelectorAll("[data-window-action]");
					for (var i = 0; i < buttons.length; i += 1) {
						buttons[i].addEventListener("click", function(event){
							sendWindowAction(event.currentTarget.getAttribute("data-window-action"));
						});
					}
				});
			}());
		</script>
		<script src="src/theme.js"></script>
		<script src="lib/jquery.min.js"></script>
		<script src="lib/pep.js"></script>
		<script src="lib/canvas.toBlob.js"></script>
		<script src="lib/gif.js/gif.js"></script>
		<script src="lib/palette.js"></script>
		<script src="lib/FileSaver.js"></script>
		<script src="lib/font-detective.js"></script>
		<script src="lib/libtess.min.js"></script>
		<script src="src/helpers.js"></script>
		<script src="src/storage.js"></script>
		<script src="src/$Component.js"></script>
		<script src="src/$Window.js"></script>
		<script src="src/$MenuBar.js"></script>
		<script src="src/$ToolBox.js"></script>
		<script src="src/$ColorBox.js"></script>
		<script src="src/$FontBox.js"></script>
		<script src="src/$Handles.js"></script>
		<script src="src/OnCanvasObject.js"></script>
		<script src="src/Selection.js"></script>
		<script src="src/TextBox.js"></script>
		<script src="src/image-manipulation.js"></script>
		<script src="src/tool-options.js"></script>
		<script src="src/tools.js"></script>
		<script src="src/functions.js"></script>
		<script src="src/manage-storage.js"></script>
		<script src="src/imgur.js"></script>
		<script src="src/help.js"></script>
		<script src="src/app.js"></script>
		<script src="src/menus.js"></script>
		<script src="src/canvas-change.js"></script>
		<script src="src/sessions.js"></script>
	</body>
</html>
